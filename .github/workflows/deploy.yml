name: Deploy MS Learn Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Fetch transcript data
        run: python scripts/fetch_transcript.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ms-learn/wwwroot/data/transcript.json
          if git diff --staged --quiet; then
            echo "No changes to transcript data"
          else
            git commit -m "chore: update transcript data [skip ci]"
            git push
          fi

  deploy:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish src/ms-learn/ms-learn.csproj -c Release -o release --nologo

      - name: Fix base path for GitHub Pages
        env:
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            BASE_HREF="/"
            printf '%s\n' "$CUSTOM_DOMAIN" > release/wwwroot/CNAME
          else
            BASE_HREF="/${{ github.event.repository.name }}/"
            rm -f release/wwwroot/CNAME
          fi
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_HREF}\" />|g" release/wwwroot/index.html
          cp release/wwwroot/index.html release/wwwroot/404.html
          touch release/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.6.8
        with:
          BRANCH: gh-pages
          FOLDER: release/wwwroot
